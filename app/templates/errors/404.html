<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class="bg-[#0F1923] min-h-screen flex items-center justify-center">

    <div class="text-center">
        <div class="text-8xl font-bold text-cyan-400 mb-4 glitch">404</div>
        <div class="text-xl text-gray-400 mb-2">
            <span class="text-red-400">ERROR:</span> Page not found
        </div>
        <p class="text-gray-500 mb-8 text-sm">
            The requested resource does not exist or has been moved.
        </p>
        <div class="space-x-4">
            <a href="/"
                class="inline-block px-6 py-3 border border-cyan-400 text-cyan-400 rounded-lg hover:bg-cyan-400/10 transition">
                Return Home
            </a>
            <a href="/auth/login"
                class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                Login
            </a>
        </div>
        <p class="text-gray-600 text-xs mt-8">[ERROR_CODE: 404] [TIMESTAMP: <span id="time"></span>]</p>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toISOString();
    </script>

    <style>
        .glitch {
            text-shadow: 2px 2px 0 #ff0000, -2px -2px 0 #00ffff;
            animation: glitch 0.5s infinite;
        }

        @keyframes glitch {

            0%,
            100% {
                text-shadow: 2px 2px 0 #ff0000, -2px -2px 0 #00ffff;
            }

            50% {
                text-shadow: -2px -2px 0 #ff0000, 2px 2px 0 #00ffff;
            }
        }
    </style>
</body>

</html>

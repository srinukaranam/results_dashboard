<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class="bg-[#0F1923] min-h-screen flex items-center justify-center">

    <div class="text-center">
        <div class="text-8xl font-bold text-red-400 mb-4">500</div>
        <div class="text-xl text-gray-400 mb-2">
            <span class="text-red-400">CRITICAL ERROR:</span> Internal server error
        </div>
        <p class="text-gray-500 mb-8 text-sm max-w-md mx-auto">
            Something went wrong on our end. The error has been logged and will be investigated.
        </p>
        <a href="/"
            class="inline-block px-6 py-3 border border-cyan-400 text-cyan-400 rounded-lg hover:bg-cyan-400/10 transition">
            Return Home
        </a>
        <p class="text-gray-600 text-xs mt-8">[ERROR_CODE: 500] [TIMESTAMP: <span id="time"></span>]</p>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toISOString();
    </script>
</body>

</html>

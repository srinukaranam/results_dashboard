<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year {{ year }} Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f14;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 16px;
        }

        .nav-blur {
            background: rgba(10, 15, 20, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .grade-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .grade-excellent {
            background: rgba(5, 150, 105, 0.2);
            color: #34d399;
            border: 1px solid rgba(5, 150, 105, 0.3);
        }

        .grade-good {
            background: rgba(13, 148, 136, 0.2);
            color: #2dd4bf;
            border: 1px solid rgba(13, 148, 136, 0.3);
        }

        .grade-average {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .grade-poor {
            background: rgba(234, 88, 12, 0.2);
            color: #fb923c;
            border: 1px solid rgba(234, 88, 12, 0.3);
        }

        .grade-fail {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>

    <nav class="nav-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="font-mono text-cyan-400 font-bold text-sm">Year {{ year }} Results</h1>
            <a href="/student/dashboard" class="text-xs font-mono text-gray-400 hover:text-cyan-400 transition">←
                Dashboard</a>
        </div>
    </nav>

    <main class="relative z-10 max-w-5xl mx-auto px-4 py-6">

        {% if year_cgpa %}
        <div class="glass-card p-5 text-center mb-6">
            <p class="text-gray-500 text-xs font-mono uppercase mb-1">Year {{ year }} CGPA</p>
            <p class="text-4xl font-bold font-mono text-teal-400">{{ "%.2f"|format(year_cgpa) }}</p>
        </div>
        {% endif %}

        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-xs font-mono text-gray-500 uppercase bg-gray-800/50">
                            <th class="py-3 px-4">Semester</th>
                            <th class="py-3 px-4">Code</th>
                            <th class="py-3 px-4">Subject</th>
                            <th class="py-3 px-4 text-center">Credits</th>
                            <th class="py-3 px-4 text-center">Grade</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-800">
                        {% for r in results %}
                        <tr class="hover:bg-gray-800/30">
                            <td class="py-3 px-4 font-mono text-xs text-gray-400">{{ r.semester }}</td>
                            <td class="py-3 px-4 font-mono text-xs text-gray-400">{{ r.subject_code }}</td>
                            <td class="py-3 px-4 text-xs text-gray-300">{{ r.subject_name }}</td>
                            <td class="py-3 px-4 text-center text-xs text-gray-400">{{ r.credits }}</td>
                            <td class="py-3 px-4 text-center">
                                <span class="grade-badge 
                                    {% if r.grade in ['A+','A','B'] %}grade-excellent
                                    {% elif r.grade == 'C' %}grade-good
                                    {% elif r.grade == 'D' %}grade-average
                                    {% elif r.grade == 'E' %}grade-poor
                                    {% else %}grade-fail{% endif %}">
                                    {{ r.grade }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>

</html>

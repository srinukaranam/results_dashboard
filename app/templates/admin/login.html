<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Result Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0F1923] min-h-screen flex items-center justify-center">
    
    <div class="bg-[#1E293B] p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h2 class="text-2xl font-bold text-cyan-400 font-mono mb-2">🛡️ Admin Access</h2>
        <p class="text-gray-400 text-sm mb-6">Restricted area - authorized personnel only</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded-lg text-sm {% if category == 'success' %}bg-teal-500/20 text-teal-400{% else %}bg-red-500/20 text-red-400{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div>
                <label class="block text-sm text-gray-300 mb-1">Email</label>
                <input type="email" name="email" required 
                       class="w-full px-4 py-2 bg-[#0F1923] border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm text-gray-300 mb-1">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-2 bg-[#0F1923] border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none">
            </div>
            
            <button type="submit" class="w-full bg-cyan-600 text-white py-2 rounded-lg hover:bg-cyan-700 transition font-medium">
                Authenticate
            </button>

            <!-- ADD THIS BACK BUTTON -->
            <a href="/" class="inline-flex items-center text-gray-500 hover:text-cyan-400 transition text-sm font-mono mb-4">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Home
            </a>
        </form>
    </div>

</body>
</html>
